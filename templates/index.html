<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiCam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; }
  header { padding: 16px; background: #1a1a1a; border-bottom: 1px solid #333; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 12px; color: #888; margin-top: 2px; }
  .video-list { padding: 12px; }
  .video-card { background: #1a1a1a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .video-info { padding: 12px; }
  .video-name { font-size: 14px; font-weight: 500; }
  .video-size { font-size: 12px; color: #888; margin-top: 2px; }
  .video-actions { display: flex; gap: 8px; padding: 0 12px 12px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-play { background: #2563eb; color: #fff; }
  .btn-download { background: #16a34a; color: #fff; }
  .btn-edit { background: #7c3aed; color: #fff; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; }
  .modal.open { display: flex; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .close-btn { background: #333; border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
  video { width: 100%; max-height: 40vh; background: #000; }
  .edit-panel { padding: 16px; flex: 1; overflow-y: auto; }
  .edit-section { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .edit-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .input-row label { font-size: 13px; color: #888; width: 50px; }
  .input-row input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; flex: 1; font-size: 14px; }
  .select-row { margin-bottom: 8px; }
  .select-row label { font-size: 13px; color: #888; display: block; margin-bottom: 4px; }
  select { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; font-size: 14px; }
  .btn-full { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn-trim { background: #7c3aed; color: #fff; }
  .btn-convert { background: #0891b2; color: #fff; }
  .status { padding: 12px; background: #1a1a1a; border-radius: 8px; font-size: 13px; margin-top: 8px; display: none; }
  .status.show { display: block; }
  .status.success { border-left: 3px solid #16a34a; }
  .status.error { border-left: 3px solid #dc2626; }
  .status.loading { border-left: 3px solid #2563eb; }
  .empty { text-align: center; padding: 60px 20px; color: #555; }
</style>
</head>
<body>

<header>
  <h1>PiCam</h1>
  <p id="subtitle">Loading videos...</p>
</header>

<div class="video-list" id="video-list"></div>

<div class="modal" id="modal">
  <div class="modal-header">
    <span class="modal-title" id="modal-title">Video</span>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <video id="modal-video" controls playsinline></video>
  <div class="edit-panel">
    <div class="edit-section">
      <h3>Trim</h3>
      <div class="input-row">
        <label>Start</label>
        <input type="number" id="trim-start" placeholder="0" min="0" step="0.1">
      </div>
      <div class="input-row">
        <label>End</label>
        <input type="number" id="trim-end" placeholder="seconds" min="0" step="0.1">
      </div>
      <button class="btn btn-full btn-trim" onclick="trimVideo()">Trim & Save</button>
    </div>
    <div class="edit-section">
      <h3>Convert</h3>
      <div class="select-row">
        <label>Quality</label>
        <select id="conv-quality">
          <option value="23">High (larger file)</option>
          <option value="28" selected>Medium (balanced)</option>
          <option value="35">Small (lower quality)</option>
        </select>
      </div>
      <button class="btn btn-full btn-convert" onclick="convertVideo()">Convert & Compress</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
  let currentPath = null;

  async function loadVideos() {
    const res = await fetch('/api/videos');
    const videos = await res.json();
    const list = document.getElementById('video-list');
    const subtitle = document.getElementById('subtitle');
    subtitle.textContent = videos.length + ' video' + (videos.length !== 1 ? 's' : '') + ' found';
    if (videos.length === 0) {
      list.innerHTML = '<div class="empty">No videos found on SD card</div>';
      return;
    }
    list.innerHTML = videos.map(v => `
      <div class="video-card">
        <div class="video-info">
          <div class="video-name">${v.name}</div>
          <div class="video-size">${v.size_mb} MB</div>
        </div>
        <div class="video-actions">
          <button class="btn btn-play" onclick="openVideo('${v.path}', '${v.name}')">▶ Play</button>
          <button class="btn btn-download" onclick="downloadVideo('${v.path}')">↓ Download</button>
          <button class="btn btn-edit" onclick="openVideo('${v.path}', '${v.name}')">✂ Edit</button>
        </div>
      </div>
    `).join('');
  }

  function openVideo(path, name) {
    currentPath = path;
    document.getElementById('modal-title').textContent = name;
    document.getElementById('modal-video').src = '/api/stream/' + path;
    document.getElementById('modal').classList.add('open');
    hideStatus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-video').src = '';
    currentPath = null;
  }

  function downloadVideo(path) {
    window.location = '/api/download/' + path;
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status show ' + type;
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  async function trimVideo() {
    if (!currentPath) return;
    const start = parseFloat(document.getElementById('trim-start').value) || 0;
    const end = parseFloat(document.getElementById('trim-end').value) || null;
    showStatus('Trimming... this may take a moment', 'loading');
    const res = await fetch('/api/trim', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: currentPath, start, end })
    });
    const data = await res.json();
    if (data.error) { showStatus('Error: ' + data.error, 'error'); return; }
    showStatus('Done! Tap to download trimmed clip', 'success');
    document.getElementById('status').style.cursor = 'pointer';
    document.getElementById('status').onclick = () => window.location = '/api/output/' + data.output;
  }

  async function convertVideo() {
    if (!currentPath) return;
    const quality = document.getElementById('conv-quality').value;
    showStatus('Converting... this may take several minutes on Pi Zero', 'loading');
    const res = await fetch('/api/convert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: currentPath, quality: parseInt(quality) })
    });
    const data = await res.json();
    if (data.error) { showStatus('Error: ' + data.error, 'error'); return; }
    showStatus('Done! Tap to download converted video', 'success');
    document.getElementById('status').style.cursor = 'pointer';
    document.getElementById('status').onclick = () => window.location = '/api/output/' + data.output;
  }

  loadVideos();
</script>
</body>
</html>
