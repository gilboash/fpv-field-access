<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV Field Access</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; }
  header { padding: 16px; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 12px; color: #888; margin-top: 2px; }
  .video-list { padding: 12px; }
  .video-card { background: #1a1a1a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .video-info { padding: 12px 12px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  .video-name { font-size: 14px; font-weight: 500; }
  .video-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-done { background: #14532d; color: #4ade80; }
  .badge-processing { background: #1e3a5f; color: #60a5fa; }
  .badge-queued { background: #2a2a2a; color: #888; }
  .badge-error { background: #450a0a; color: #f87171; }
  .video-actions { display: flex; gap: 8px; padding: 0 12px 12px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-play { background: #2563eb; color: #fff; }
  .btn-dl-orig { background: #374151; color: #fff; }
  .btn-dl-comp { background: #16a34a; color: #fff; }
  .btn-edit { background: #7c3aed; color: #fff; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; overflow-y: auto; }
  .modal.open { display: flex; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; position: sticky; top: 0; background: #0f0f0f; z-index: 1; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .close-btn { background: #333; border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; }
  video { width: 100%; background: #000; }
  .edit-panel { padding: 16px; }
  .edit-section { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .edit-section h3 { font-size: 12px; font-weight: 600; margin-bottom: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .input-row label { font-size: 13px; color: #888; width: 50px; }
  .input-row input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; flex: 1; font-size: 14px; }
  .hint { font-size: 11px; color: #555; margin-bottom: 10px; }
  .btn-full { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn-trim { background: #7c3aed; color: #fff; }
  .status { padding: 12px; background: #1a1a1a; border-radius: 8px; font-size: 13px; margin-top: 8px; display: none; }
  .status.show { display: block; }
  .status.success { border-left: 3px solid #16a34a; color: #4ade80; }
  .status.error { border-left: 3px solid #dc2626; color: #f87171; }
  .status.loading { border-left: 3px solid #2563eb; color: #60a5fa; }
  .empty { text-align: center; padding: 60px 20px; color: #555; }
  .progress-bar { height: 2px; background: #333; margin: 0 12px 12px; border-radius: 2px; overflow: hidden; display: none; }
  .progress-bar.show { display: block; }
  .progress-fill { height: 100%; background: #2563eb; width: 0%; transition: width 0.3s; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<header>
  <h1>FPV Field Access</h1>
  <p id="subtitle">Loading...</p>
</header>

<div class="video-list" id="video-list"></div>

<div class="modal" id="modal">
  <div class="modal-header">
    <span class="modal-title" id="modal-title">Video</span>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <video id="modal-video" controls playsinline></video>
  <div class="edit-panel">
    <div class="edit-section">
      <h3>Trim clip</h3>
      <p class="hint">Check the video timestamp for start/end seconds</p>
      <div class="input-row">
        <label>Start</label>
        <input type="number" id="trim-start" placeholder="0 sec" min="0" step="1">
      </div>
      <div class="input-row">
        <label>End</label>
        <input type="number" id="trim-end" placeholder="sec" min="0" step="1">
      </div>
      <button class="btn btn-full btn-trim" onclick="trimVideo()">✂ Trim & Save at 480p</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
  let currentPath = null;
  let currentName = null;
  let pollInterval = null;

  function badgeHtml(status) {
    const map = {
      done: ['badge-done', '● Ready'],
      processing: ['badge-processing', '⟳ Processing'],
      queued: ['badge-queued', '○ Queued'],
      error: ['badge-error', '✕ Error']
    };
    const [cls, label] = map[status] || map.queued;
    return `<span class="badge ${cls}">${label}</span>`;
  }

  async function loadVideos() {
    const res = await fetch('/api/videos');
    const videos = await res.json();
    const list = document.getElementById('video-list');
    const subtitle = document.getElementById('subtitle');

    const done = videos.filter(v => v.proxy_status === 'done').length;
    const total = videos.length;
    subtitle.textContent = `${total} video${total !== 1 ? 's' : ''} · ${done}/${total} proxies ready`;

    if (videos.length === 0) {
      list.innerHTML = '<div class="empty">No videos found on SD card</div>';
      return;
    }

    list.innerHTML = videos.map(v => `
      <div class="video-card">
        <div class="video-info">
          <div>
            <div class="video-name">${v.name}</div>
            <div class="video-meta">${v.size_mb} MB</div>
          </div>
          ${badgeHtml(v.proxy_status)}
        </div>
        ${v.proxy_status === 'processing' ? '<div class="progress-bar show"><div class="progress-fill"></div></div>' : ''}
        <div class="video-actions">
          <button class="btn btn-play" onclick="openVideo('${v.path}', '${v.name}')"
            ${v.proxy_status !== 'done' ? 'disabled' : ''}>▶ Play</button>
          <button class="btn btn-dl-comp" onclick="downloadCompressed('${v.path}')"
            ${!v.has_proxy ? 'disabled' : ''}>↓ Mobile</button>
          <button class="btn btn-dl-orig" onclick="downloadOriginal('${v.path}')">↓ Original</button>
          <button class="btn btn-edit" onclick="openVideo('${v.path}', '${v.name}')"
            ${v.proxy_status !== 'done' ? 'disabled' : ''}>✂ Trim</button>
        </div>
      </div>
    `).join('');

    // keep polling if anything is still processing
    const busy = videos.some(v => v.proxy_status === 'queued' || v.proxy_status === 'processing');
    if (busy && !pollInterval) {
      pollInterval = setInterval(loadVideos, 5000);
    } else if (!busy && pollInterval) {
      clearInterval(pollInterval);
      pollInterval = null;
    }
  }

  function openVideo(path, name) {
    currentPath = path;
    currentName = name;
    document.getElementById('modal-title').textContent = name;
    document.getElementById('modal-video').src = '/api/stream/' + path;
    document.getElementById('modal').classList.add('open');
    hideStatus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-video').src = '';
    currentPath = null;
  }

  function downloadOriginal(path) {
    window.location = '/api/download/original/' + path;
  }

  function downloadCompressed(path) {
    window.location = '/api/download/compressed/' + path;
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status');
    s.textContent = msg;
    s.className = 'status show ' + type;
    s.onclick = null;
    s.style.cursor = 'default';
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  async function trimVideo() {
    if (!currentPath) return;
    const start = parseFloat(document.getElementById('trim-start').value) || 0;
    const end = parseFloat(document.getElementById('trim-end').value) || null;
    if (end && end <= start) {
      showStatus('End must be greater than start', 'error');
      return;
    }
    showStatus('Trimming... this may take a few minutes on Pi Zero', 'loading');
    const res = await fetch('/api/trim', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: currentPath, start, end })
    });
    const data = await res.json();
    if (data.error) {
      showStatus('Error: ' + data.error.split('\n').pop(), 'error');
      return;
    }
    showStatus('✓ Done — tap to download', 'success');
    document.getElementById('status').style.cursor = 'pointer';
    document.getElementById('status').onclick = () => window.location = '/api/output/' + data.output;
  }

  loadVideos();
</script>
</body>
</html>
