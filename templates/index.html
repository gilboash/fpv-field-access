<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV Field Access</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; }
  header { padding: 16px; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 12px; color: #888; margin-top: 2px; }
  .video-list { padding: 12px; padding-bottom: 80px; }

  .video-card { background: #1a1a1a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; display: flex; position: relative; }
  .ts-card { border: 1px solid #f59e0b33; }
  .ts-card.selected { border-color: #f59e0b; background: #1a1a0a; }

  .thumb-wrap { width: 120px; flex-shrink: 0; background: #111; cursor: pointer; position: relative; }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-wrap .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.2s; font-size: 28px; }
  .thumb-wrap:hover .play-icon, .thumb-wrap:active .play-icon { opacity: 1; }
  .thumb-placeholder { width: 100%; height: 100%; min-height: 80px; background: #222; display: flex; align-items: center; justify-content: center; color: #555; font-size: 11px; }
  .ts-badge { color: #f59e0b; font-size: 16px; font-weight: 700; background: #1a1400; }

  .card-body { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
  .video-name { font-size: 14px; font-weight: 500; }
  .video-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn { padding: 7px 12px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; font-weight: 500; }
  .btn-play { background: #2563eb; color: #fff; }
  .btn-convert { background: #b45309; color: #fff; }
  .btn-dl { background: #374151; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* checkbox */
  .ts-checkbox { position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; cursor: pointer; accent-color: #f59e0b; z-index: 2; }

  /* convert status badge on card */
  .conv-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; font-weight: 500; }
  .conv-badge.queued { background: #2a2a2a; color: #888; }
  .conv-badge.running { background: #1e3a5f; color: #60a5fa; }
  .conv-badge.done { background: #14532d; color: #4ade80; }
  .conv-badge.error { background: #450a0a; color: #f87171; }

  /* floating convert bar */
  .convert-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 50; transform: translateY(100%); transition: transform 0.25s; }
  .convert-bar.visible { transform: translateY(0); }
  .convert-bar-label { font-size: 13px; color: #aaa; }
  .btn-convert-all { padding: 10px 20px; border-radius: 10px; border: none; background: #b45309; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

  /* modals */
  .modal { display: none; position: fixed; inset: 0; background: #0f0f0f; z-index: 100; flex-direction: column; overflow-y: auto; }
  .modal.open { display: flex; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; position: sticky; top: 0; background: #0f0f0f; z-index: 1; border-bottom: 1px solid #222; }
  .modal-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
  .close-btn { background: #2a2a2a; border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; flex-shrink: 0; }
  video { width: 100%; background: #000; }

  .trim-panel { padding: 16px; }
  .section { background: #1a1a1a; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .section-title { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .input-row { display: flex; align-items: center; gap: 10px; }
  .input-row label { font-size: 13px; color: #888; width: 44px; flex-shrink: 0; }
  .input-row input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 8px; flex: 1; font-size: 14px; }
  .use-current { padding: 8px 12px; border-radius: 8px; border: 1px solid #2563eb44; background: #2563eb22; color: #60a5fa; font-size: 12px; cursor: pointer; white-space: nowrap; }

  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 7px 14px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #888; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .pill.dur-active { border-color: #7c3aed; background: #7c3aed22; color: #c084fc; }
  .pill.q-active { border-color: #2563eb; background: #2563eb22; color: #60a5fa; }
  .quality-desc { font-size: 12px; color: #555; margin-top: 8px; }

  .btn-full { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; background: #7c3aed; color: #fff; margin-top: 4px; }
  .btn-full:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-wrap { margin-top: 12px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar { height: 4px; background: #2a2a2a; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #7c3aed; border-radius: 4px; transition: width 0.4s; width: 0%; }

  .result-box { margin-top: 12px; padding: 12px; background: #0f2a1a; border: 1px solid #1a4a2a; border-radius: 8px; display: none; }
  .result-box.show { display: block; }
  .result-box p { font-size: 13px; color: #4ade80; margin-bottom: 8px; }
  .btn-download-result { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #16a34a; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

  .error-box { margin-top: 12px; padding: 12px; background: #2a0f0f; border: 1px solid #4a1a1a; border-radius: 8px; font-size: 12px; color: #f87171; display: none; }
  .error-box.show { display: block; }
  .divider { font-size: 11px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.6px; padding: 4px 0 12px; }
  .empty { text-align: center; padding: 60px 20px; color: #555; }
  .convert-info { font-size: 13px; color: #aaa; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>FPV Field Access</h1>
  <p id="subtitle">Loading...</p>
</header>

<div class="video-list" id="video-list"></div>

<!-- Floating convert bar -->
<div class="convert-bar" id="convert-bar">
  <span class="convert-bar-label" id="convert-bar-label">0 files selected</span>
  <button class="btn-convert-all" onclick="convertSelected()">⟳ Convert selected</button>
</div>

<!-- Player + trim modal -->
<div class="modal" id="modal">
  <div class="modal-header">
    <span class="modal-title" id="modal-title"></span>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <video id="modal-video" controls playsinline></video>
  <div class="trim-panel">
    <div class="divider">Trim & Export</div>
    <div class="section">
      <div class="section-title">Start time</div>
      <div class="input-row">
        <label>Start</label>
        <input type="number" id="trim-start" placeholder="0" min="0" step="1" value="0">
        <button class="use-current" onclick="useCurrentTime()">Use current</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Clip duration</div>
      <div class="pill-group" id="duration-pills">
        <button class="pill" onclick="setDuration(5, this)">5s</button>
        <button class="pill" onclick="setDuration(10, this)">10s</button>
        <button class="pill" onclick="setDuration(15, this)">15s</button>
        <button class="pill dur-active" onclick="setDuration(30, this)">30s</button>
        <button class="pill" onclick="setDuration(60, this)">60s</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Quality</div>
      <div class="pill-group" id="quality-pills">
        <button class="pill q-active" onclick="setQuality('original', this)">Original</button>
        <button class="pill" onclick="setQuality('medium', this)">Medium</button>
        <button class="pill" onclick="setQuality('low', this)">Low</button>
      </div>
      <div class="quality-desc" id="quality-desc">Full quality, instant — same as source</div>
    </div>
    <button class="btn-full" id="trim-btn" onclick="startTrim()">✂ Trim & Export</button>
    <div class="progress-wrap" id="trim-progress-wrap">
      <div class="progress-label">
        <span id="trim-progress-text">Encoding...</span>
        <span id="trim-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="trim-fill"></div></div>
    </div>
    <div class="result-box" id="trim-result">
      <p>✓ Ready to download</p>
      <button class="btn-download-result" onclick="downloadTrimResult()">↓ Download clip</button>
    </div>
    <div class="error-box" id="trim-error"></div>
  </div>
</div>

<script>
  let currentPath = null;
  let trimDuration = 30;
  let trimQuality = 'original';
  let trimResultFilename = null;
  let trimPollTimer = null;

  // job_id -> path mapping for queue status
  let queueJobs = {};
  let queuePollTimer = null;

  const qualityDescs = {
    original: 'Full quality, instant — same as source',
    medium: '30fps, compressed H264 — good for sharing',
    low: '24fps, 640px wide, small file — fast download'
  };

  function setDuration(val, el) {
    trimDuration = val;
    document.querySelectorAll('#duration-pills .pill').forEach(p => p.classList.remove('dur-active'));
    el.classList.add('dur-active');
  }

  function setQuality(val, el) {
    trimQuality = val;
    document.querySelectorAll('#quality-pills .pill').forEach(p => p.classList.remove('q-active'));
    el.classList.add('q-active');
    document.getElementById('quality-desc').textContent = qualityDescs[val];
  }

  function useCurrentTime() {
    const video = document.getElementById('modal-video');
    document.getElementById('trim-start').value = Math.floor(video.currentTime);
  }

  // --- checkbox & convert bar ---
  function toggleSelect(path, el) {
    const card = el.closest('.video-card');
    card.classList.toggle('selected', el.checked);
    updateConvertBar();
  }

  function updateConvertBar() {
    const checked = document.querySelectorAll('.ts-checkbox:checked');
    const bar = document.getElementById('convert-bar');
    const label = document.getElementById('convert-bar-label');
    if (checked.length > 0) {
      bar.classList.add('visible');
      label.textContent = `${checked.length} file${checked.length > 1 ? 's' : ''} selected`;
    } else {
      bar.classList.remove('visible');
    }
  }

  async function convertSelected() {
    const checked = document.querySelectorAll('.ts-checkbox:checked');
    const paths = Array.from(checked).map(cb => cb.dataset.path);
    if (!paths.length) return;

    // uncheck all
    checked.forEach(cb => {
      cb.checked = false;
      cb.closest('.video-card').classList.remove('selected');
    });
    updateConvertBar();

    const res = await fetch('/api/convert_queue', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ paths })
    });
    const data = await res.json();

    // store job_id -> path mapping
    data.jobs.forEach(j => {
      if (!j.error) queueJobs[j.job_id] = j.path;
    });

    // show errors immediately
    data.jobs.filter(j => j.error).forEach(j => {
      alert(`${j.path}: ${j.error}`);
    });

    // start polling queue status
    startQueuePoll();
    loadVideos(); // refresh to show queued badges
  }

  function startQueuePoll() {
    if (queuePollTimer) return;
    queuePollTimer = setInterval(async () => {
      const res = await fetch('/api/queue_status');
      const statuses = await res.json();

      // update badges on cards
      Object.entries(queueJobs).forEach(([jobId, path]) => {
        const job = statuses[jobId];
        if (!job) return;
        const badge = document.querySelector(`.conv-badge[data-job="${jobId}"]`);
        if (badge) {
          badge.className = `conv-badge ${job.status}`;
          badge.textContent = { queued: '○ Queued', running: '⟳ Converting', done: '✓ Done', error: '✕ Error' }[job.status] || job.status;
        }
      });

      // stop polling when all done
      const allDone = Object.keys(queueJobs).every(id => {
        const j = statuses[id];
        return j && (j.status === 'done' || j.status === 'error');
      });

      if (allDone && Object.keys(queueJobs).length > 0) {
        clearInterval(queuePollTimer);
        queuePollTimer = null;
        queueJobs = {};
        loadVideos(); // refresh to show converted files
      }
    }, 2000);
  }

  // --- video list ---
  async function loadVideos() {
    const res = await fetch('/api/videos');
    const videos = await res.json();
    document.getElementById('subtitle').textContent =
      `${videos.length} video${videos.length !== 1 ? 's' : ''} on SD card`;

    const list = document.getElementById('video-list');
    if (videos.length === 0) {
      list.innerHTML = '<div class="empty">No videos found on SD card</div>';
      return;
    }

    // get current queue status to show badges on reload
    let statuses = {};
    try {
      const sr = await fetch('/api/queue_status');
      statuses = await sr.json();
    } catch(e) {}

    list.innerHTML = videos.map(v => {
      const isTs = v.type === 'ts';
      const hasConverted = isTs && v.converted;

      // find active job for this path
      const activeJob = Object.entries(statuses).find(([id, job]) => job.path === v.path && job.status !== 'done' && job.status !== 'error');
      const jobId = activeJob ? activeJob[0] : null;
      const jobStatus = activeJob ? activeJob[1].status : null;

      return `
        <div class="video-card ${isTs ? 'ts-card' : ''}" id="card-${encodeURIComponent(v.path)}">
          ${isTs ? `<input type="checkbox" class="ts-checkbox" data-path="${v.path}"
            onchange="toggleSelect('${v.path}', this)"
            ${jobStatus ? 'disabled' : ''}>` : ''}
          <div class="thumb-wrap" onclick="${isTs ? '' : `openModal('${v.path}', '${v.name}')`}"
            style="${isTs ? 'cursor:default' : ''}">
            ${isTs
              ? `<div class="thumb-placeholder ts-badge">TS</div>`
              : `<img src="/api/thumbnail/${v.path}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
                 <div class="thumb-placeholder" style="display:none">No preview</div>`
            }
            ${!isTs ? '<div class="play-icon">▶</div>' : ''}
          </div>
          <div class="card-body">
            <div>
              <div class="video-name">${v.name}</div>
              <div class="video-meta">
                ${v.size_mb} MB ·
                ${isTs
                  ? hasConverted
                    ? '<span style="color:#4ade80">✓ MP4 ready</span>'
                    : jobId
                      ? `<span class="conv-badge ${jobStatus}" data-job="${jobId}">${
                          {queued: '○ Queued', running: '⟳ Converting'}[jobStatus]
                        }</span>`
                      : '<span style="color:#f59e0b">TS file</span>'
                  : 'MP4'
                }
              </div>
            </div>
            <div class="card-actions">
              ${isTs
                ? hasConverted
                  ? `<button class="btn btn-convert" onclick="reconvert('${v.path}')">⟳ Re-convert</button>`
                  : jobStatus
                    ? `<button class="btn btn-convert" disabled>⟳ ${jobStatus === 'running' ? 'Converting...' : 'Queued'}</button>`
                    : ''
                : `<button class="btn btn-play" onclick="openModal('${v.path}', '${v.name}')">▶ Play & Trim</button>`
              }
              <button class="btn btn-dl" onclick="downloadOriginal('${v.path}')">↓ Original</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function reconvert(path) {
    const res = await fetch('/api/convert_queue', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ paths: [path] })
    });
    const data = await res.json();
    data.jobs.forEach(j => {
      if (!j.error) queueJobs[j.job_id] = j.path;
      else alert(j.error);
    });
    startQueuePoll();
    loadVideos();
  }

  function openModal(path, name) {
    currentPath = path;
    document.getElementById('modal-title').textContent = name;
    document.getElementById('modal-video').src = '/api/stream/' + path;
    document.getElementById('trim-start').value = 0;
    document.getElementById('trim-btn').disabled = false;
    document.getElementById('trim-progress-wrap').classList.remove('show');
    document.getElementById('trim-result').classList.remove('show');
    document.getElementById('trim-error').classList.remove('show');
    document.getElementById('trim-fill').style.width = '0%';
    trimResultFilename = null;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-video').pause();
    document.getElementById('modal-video').src = '';
    if (trimPollTimer) { clearInterval(trimPollTimer); trimPollTimer = null; }
    currentPath = null;
  }

  function downloadOriginal(path) {
    window.location = '/api/download/' + path;
  }

  function downloadTrimResult() {
    if (trimResultFilename) window.location = '/api/output/' + trimResultFilename;
  }

  async function startTrim() {
    if (!currentPath) return;
    const start = parseFloat(document.getElementById('trim-start').value) || 0;
    document.getElementById('trim-btn').disabled = true;
    document.getElementById('trim-result').classList.remove('show');
    document.getElementById('trim-error').classList.remove('show');
    document.getElementById('trim-progress-wrap').classList.add('show');
    document.getElementById('trim-fill').style.width = '0%';
    document.getElementById('trim-pct').textContent = '0%';
    document.getElementById('trim-progress-text').textContent =
      trimQuality === 'original' ? 'Copying (no re-encode)...' : 'Encoding — this may take a few minutes...';

    const res = await fetch('/api/trim', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: currentPath, start, duration: trimDuration, quality: trimQuality })
    });
    const data = await res.json();
    if (data.error) { showTrimError(data.error); return; }
    pollTrimProgress(data.job_id);
  }

  function pollTrimProgress(jobId) {
    if (trimPollTimer) clearInterval(trimPollTimer);
    trimPollTimer = setInterval(async () => {
      const res = await fetch(`/api/progress/${jobId}?duration=${trimDuration}`);
      const data = await res.json();
      if (data.status === 'running' || data.status === 'queued') {
        const pct = data.progress || 0;
        document.getElementById('trim-fill').style.width = pct + '%';
        document.getElementById('trim-pct').textContent = pct + '%';
      } else if (data.status === 'done') {
        clearInterval(trimPollTimer); trimPollTimer = null;
        document.getElementById('trim-fill').style.width = '100%';
        document.getElementById('trim-pct').textContent = '100%';
        trimResultFilename = data.output;
        setTimeout(() => {
          document.getElementById('trim-progress-wrap').classList.remove('show');
          document.getElementById('trim-result').classList.add('show');
          document.getElementById('trim-btn').disabled = false;
        }, 400);
      } else if (data.status === 'error') {
        clearInterval(trimPollTimer); trimPollTimer = null;
        showTrimError(data.error || 'Encoding failed');
      }
    }, 1000);
  }

  function showTrimError(msg) {
    document.getElementById('trim-btn').disabled = false;
    document.getElementById('trim-progress-wrap').classList.remove('show');
    document.getElementById('trim-error').textContent = 'Error: ' + msg;
    document.getElementById('trim-error').classList.add('show');
  }

  loadVideos();
</script>
</body>
</html>
